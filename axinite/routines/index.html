<!DOCTYPE html><html lang="en" class="dark"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/icons/axinite32.ico" sizes="32x32">
    <title>Routines - Axinite</title>
    <link rel="stylesheet" href="../assets/css/index.css">
    <script src="../assets/vendor/tailwindcss-browser-4.2.1.js"></script>
    <script src="../assets/vendor/iconify-icon-3.0.2.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400..700&family=Molengo&display=swap" rel="stylesheet">
    <script src="../assets/js/tailwind-config.js"></script>
</head>
<body class="h-screen w-full overflow-hidden bg-brand-dark bg-mesh-gradient flex flex-col font-sans text-sm antialiased">

    <!-- Top Navigation -->
    <header id="header" class="glass-topbar w-full h-14 flex items-center justify-between px-4 z-20 shrink-0">
        <div class="flex items-center space-x-6 h-full">
            <nav class="flex h-full space-x-1">
                <a href="../chat/" class="h-full px-4 flex items-center text-zinc-400 hover:text-zinc-200 transition-colors">Chat</a>
                <a href="../memory/" class="h-full px-4 flex items-center text-zinc-400 hover:text-zinc-200 transition-colors">Memory</a>
                <a href="../jobs/" class="h-full px-4 flex items-center text-zinc-400 hover:text-zinc-200 transition-colors">Jobs</a>
                <a href="../routines/" class="h-full px-4 flex items-center text-brand-emerald border-b-2 border-brand-emerald font-medium">Routines</a>
                <a href="../extensions/" class="h-full px-4 flex items-center text-zinc-400 hover:text-zinc-200 transition-colors">Extensions</a>
                <a href="../skills/" class="h-full px-4 flex items-center text-zinc-400 hover:text-zinc-200 transition-colors">Skills</a>
            </nav>
        </div>

        <div class="flex items-center space-x-4">
            <button type="button" class="text-xs text-zinc-400 hover:text-zinc-200 px-3 py-1.5 rounded-md hover:bg-glass-100 transition-colors border border-glass-border">
                Logs
            </button>
            <div class="flex items-center space-x-2 text-xs text-zinc-400">
                <span class="w-2 h-2 rounded-full bg-brand-emerald shadow-[0_0_8px_rgba(0,255,65,0.5)]"></span>
                <span>Connected</span>
            </div>
        </div>
    </header>

    <!-- Background watermark -->
    <iconify-icon icon="carbon:repeat" class="fixed bottom-[-3vh] right-[-2vw] text-white pointer-events-none z-0" style="font-size: 30vh; opacity: 0.025;"></iconify-icon>

    <div class="flex flex-1 overflow-hidden relative z-10">
        <main class="flex-1 overflow-y-auto">
            <div class="max-w-6xl mx-auto px-6 py-6 space-y-6">

                <!-- Summary cards -->
                <div class="overflow-x-auto">
                    <div id="summary-cards" class="grid grid-cols-5 gap-3 min-w-[560px]"></div>
                </div>

                <!-- Routine table -->
                <section>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-left text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">
                                    <th class="pb-2 pl-3">Name</th>
                                    <th class="pb-2">Trigger</th>
                                    <th class="pb-2">Action</th>
                                    <th class="pb-2">Last Run</th>
                                    <th class="pb-2">Next Run</th>
                                    <th class="pb-2">Runs</th>
                                    <th class="pb-2">Status</th>
                                    <th class="pb-2 pl-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="routine-rows"></tbody>
                        </table>
                    </div>
                    <p id="empty-msg" class="hidden text-center text-zinc-500 text-sm py-12">No routines configured. Ask the assistant to create one.</p>
                </section>

            </div>
        </main>
    </div>

    <!-- Routine detail modal -->
    <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div id="detail-backdrop" class="absolute inset-0 bg-black/60"></div>
        <div class="relative rounded-2xl p-6 w-full max-w-lg mx-4 border border-glass-border max-h-[80vh] flex flex-col" style="background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
            <h3 id="detail-title" class="text-lg font-semibold text-zinc-100 mb-1 font-serif"></h3>
            <div id="detail-meta" class="flex items-center gap-2 mb-4 flex-wrap"></div>
            <div id="detail-body" class="flex-1 overflow-y-auto space-y-4"></div>
            <div class="flex justify-end space-x-3 mt-4">
                <span id="detail-actions"></span>
                <button type="button" id="detail-close" class="px-4 py-2 rounded-lg text-sm text-zinc-300 font-medium transition-colors border border-red-500/60 hover:bg-red-500/10">Close</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/dashboard.js"></script>
    <script>
    (function () {
        /* ── data ──────────────────────────────────────────────── */
        var routines = [
            {
                name: 'Morning standup digest',
                description: 'Summarise open PRs, unresolved review threads, and CI failures from the last 24 hours. Post a digest to the team channel.',
                enabled: true,
                triggerType: 'cron',
                triggerSummary: '0 9 * * MON-FRI',
                trigger: { schedule: '0 9 * * MON-FRI', timezone: 'Europe/London' },
                actionType: 'lightweight',
                action: { prompt: 'Review open PRs and CI status, then summarise for standup.', contextPaths: ['context/priorities.md'], maxTokens: 4096 },
                guardrails: { cooldown: '5m', maxConcurrent: 1 },
                notify: { channel: 'telegram', onAttention: true, onFailure: true, onSuccess: false },
                lastRunAt: '2026-03-12 09:00',
                nextFireAt: '2026-03-13 09:00',
                runCount: 47,
                consecutiveFailures: 0,
                status: 'active',
                createdAt: '2026-02-01 10:00',
                recentRuns: [
                    { startedAt: '09:00:01', completedAt: '09:00:14', status: 'ok', tokensUsed: 1847 },
                    { startedAt: '09:00:02 (Mar 11)', completedAt: '09:00:18', status: 'attention', tokensUsed: 2105 },
                    { startedAt: '09:00:01 (Mar 10)', completedAt: '09:00:11', status: 'ok', tokensUsed: 1632 },
                ]
            },
            {
                name: 'Deploy notification',
                description: 'Watch for deploy commands in chat and spawn a full job to verify deployment health, run smoke tests, and report results.',
                enabled: true,
                triggerType: 'event',
                triggerSummary: 'deploy\\s+\\w+',
                trigger: { channel: null, pattern: 'deploy\\s+\\w+' },
                actionType: 'full_job',
                action: { title: 'Post-deploy verification', description: 'Run smoke tests and health checks after deployment.', maxIterations: 10, toolPermissions: ['shell', 'http_request'] },
                guardrails: { cooldown: '10m', maxConcurrent: 1 },
                notify: { channel: 'telegram', onAttention: true, onFailure: true, onSuccess: true },
                lastRunAt: '2026-03-11 16:45',
                nextFireAt: null,
                runCount: 12,
                consecutiveFailures: 0,
                status: 'active',
                createdAt: '2026-02-15 14:30',
                recentRuns: [
                    { startedAt: '16:45:03 (Mar 11)', completedAt: '16:52:41', status: 'ok', tokensUsed: null, jobId: 'abc123' },
                    { startedAt: '11:20:01 (Mar 10)', completedAt: '11:28:15', status: 'ok', tokensUsed: null, jobId: 'def456' },
                ]
            },
            {
                name: 'Issue triage',
                description: 'When a new GitHub issue is opened, classify it by component and severity, then assign to the appropriate team member.',
                enabled: true,
                triggerType: 'system_event',
                triggerSummary: 'github / issue.opened',
                trigger: { source: 'github', eventType: 'issue.opened', filters: {} },
                actionType: 'lightweight',
                action: { prompt: 'Classify the issue by component and severity. Suggest an assignee.', contextPaths: ['context/team-roster.md'], maxTokens: 2048 },
                guardrails: { cooldown: '1m', maxConcurrent: 2 },
                notify: { channel: 'slack', onAttention: true, onFailure: true, onSuccess: false },
                lastRunAt: '2026-03-12 10:15',
                nextFireAt: null,
                runCount: 89,
                consecutiveFailures: 3,
                status: 'failing',
                createdAt: '2026-01-20 09:00',
                recentRuns: [
                    { startedAt: '10:15:02', completedAt: '10:15:04', status: 'failed', tokensUsed: 0 },
                    { startedAt: '09:42:01', completedAt: '09:42:03', status: 'failed', tokensUsed: 0 },
                    { startedAt: '08:11:05', completedAt: '08:11:07', status: 'failed', tokensUsed: 0 },
                ]
            },
            {
                name: 'Weekly metrics report',
                description: 'Compile weekly development metrics including velocity, code coverage trends, and dependency audit results. Produce a markdown report.',
                enabled: false,
                triggerType: 'cron',
                triggerSummary: '0 8 * * MON',
                trigger: { schedule: '0 8 * * MON', timezone: 'Europe/London' },
                actionType: 'full_job',
                action: { title: 'Weekly metrics compilation', description: 'Gather velocity, coverage, and dependency data. Write report.', maxIterations: 15, toolPermissions: ['shell', 'workspace_read'] },
                guardrails: { cooldown: '1h', maxConcurrent: 1 },
                notify: { channel: 'telegram', onAttention: true, onFailure: true, onSuccess: true },
                lastRunAt: '2026-02-24 08:00',
                nextFireAt: null,
                runCount: 15,
                consecutiveFailures: 0,
                status: 'disabled',
                createdAt: '2025-12-01 11:00',
                recentRuns: [
                    { startedAt: '08:00:02 (Feb 24)', completedAt: '08:12:34', status: 'ok', tokensUsed: null, jobId: 'ghi789' },
                ]
            },
            {
                name: 'Manual health check',
                description: 'Run a comprehensive health check across all connected services, extensions, and workspace integrity. Triggered manually by the operator.',
                enabled: true,
                triggerType: 'manual',
                triggerSummary: 'Manual',
                trigger: {},
                actionType: 'lightweight',
                action: { prompt: 'Check all connected services, verify extension configs, and validate workspace integrity.', contextPaths: [], maxTokens: 4096 },
                guardrails: { cooldown: '5m', maxConcurrent: 1 },
                notify: { channel: 'tui', onAttention: true, onFailure: true, onSuccess: true },
                lastRunAt: '2026-03-09 15:30',
                nextFireAt: null,
                runCount: 6,
                consecutiveFailures: 0,
                status: 'active',
                createdAt: '2026-02-20 16:00',
                recentRuns: [
                    { startedAt: '15:30:01 (Mar 9)', completedAt: '15:30:22', status: 'ok', tokensUsed: 3241 },
                ]
            },
        ];

        var statusStyle = {
            'active':   { color: 'text-brand-emerald', bg: 'bg-emerald-500/15 text-emerald-400' },
            'disabled': { color: 'text-zinc-400',      bg: 'bg-zinc-500/20 text-zinc-400' },
            'failing':  { color: 'text-red-400',       bg: 'bg-red-500/15 text-red-400' },
        };

        var statusLabel = {
            'active': 'Active', 'disabled': 'Disabled', 'failing': 'Failing',
        };

        var triggerStyle = {
            'cron':         'bg-blue-500/15 text-blue-400',
            'event':        'bg-violet-500/15 text-violet-400',
            'system_event': 'bg-amber-500/15 text-amber-400',
            'manual':       'bg-zinc-500/20 text-zinc-400',
        };

        var triggerLabel = {
            'cron': 'Cron', 'event': 'Event', 'system_event': 'System', 'manual': 'Manual',
        };

        var actionStyle = {
            'lightweight': 'bg-zinc-500/20 text-zinc-400',
            'full_job':    'bg-indigo-500/20 text-indigo-400',
        };

        var actionLabel = {
            'lightweight': 'Lightweight', 'full_job': 'Full Job',
        };

        var runStatusStyle = {
            'running':   { color: 'text-brand-emerald' },
            'ok':        { color: 'text-brand-emerald' },
            'attention': { color: 'text-amber-400' },
            'failed':    { color: 'text-red-400' },
        };

        var summaryDefs = [
            { key: 'total',      label: 'TOTAL',      color: 'text-white' },
            { key: 'enabled',    label: 'ENABLED',     color: 'text-brand-emerald' },
            { key: 'disabled',   label: 'DISABLED',    color: 'text-zinc-400' },
            { key: 'failing',    label: 'FAILING',     color: 'text-red-400' },
            { key: 'runs_today', label: 'RUNS TODAY',  color: 'text-brand-emerald' },
        ];

        var activeFilter = null;

        /* ── elements ──────────────────────────────────────────── */
        var summaryCardsEl = document.getElementById('summary-cards');
        var routineRowsEl  = document.getElementById('routine-rows');
        var emptyMsg       = document.getElementById('empty-msg');
        var modalTitle     = document.getElementById('detail-title');
        var modalMeta      = document.getElementById('detail-meta');
        var modalBody      = document.getElementById('detail-body');
        var modalActions   = document.getElementById('detail-actions');

        /* ── helpers ───────────────────────────────────────────── */
        var esc = escapeHtml;

        var statusMap = { 'enabled': 'active', 'disabled': 'disabled', 'failing': 'failing' };

        function getTodayDate() {
            var now = new Date();
            var month = String(now.getMonth() + 1).padStart(2, '0');
            var day = String(now.getDate()).padStart(2, '0');
            return now.getFullYear() + '-' + month + '-' + day;
        }

        function triggerRoutine(routine) {
            routine.runCount++;
            routine.lastRunAt = getTodayDate() + ' now';
            routine.recentRuns.unshift({ startedAt: 'now', completedAt: 'now', status: 'ok', tokensUsed: 0 });
        }

        function countByStatus(key) {
            var mapped = statusMap[key] || key;
            return routines.filter(function (r) { return r.status === mapped; }).length;
        }

        function countRunsToday() {
            var count = 0;
            var today = getTodayDate();
            routines.forEach(function (r) {
                if (r.lastRunAt && r.lastRunAt.indexOf(today) === 0) {
                    r.recentRuns.forEach(function (run) {
                        if (run.startedAt.indexOf('(') === -1) count++;
                    });
                }
            });
            return count;
        }

        function summaryCount(key) {
            if (key === 'total') return routines.length;
            if (key === 'runs_today') return countRunsToday();
            return countByStatus(key);
        }

        /* ── render summary cards ────────────────────────────── */
        function renderSummary() {
            renderSummaryCards(summaryCardsEl, summaryDefs, summaryCount, activeFilter, function (key) {
                activeFilter = activeFilter === key ? null : key;
                renderSummary();
                renderTable();
            });
        }

        /* ── render routine table ────────────────────────────── */
        function renderTable() {
            routineRowsEl.innerHTML = '';
            var filtered = routines;

            if (activeFilter && activeFilter !== 'total') {
                if (activeFilter === 'runs_today') {
                    var today = getTodayDate();
                    filtered = routines.filter(function (r) {
                        return r.lastRunAt && r.lastRunAt.indexOf(today) === 0;
                    });
                } else {
                    var target = statusMap[activeFilter] || activeFilter;
                    filtered = routines.filter(function (r) { return r.status === target; });
                }
            }

            if (filtered.length === 0) {
                emptyMsg.classList.remove('hidden');
                return;
            }
            emptyMsg.classList.add('hidden');

            filtered.forEach(function (routine) {
                var ss = statusStyle[routine.status] || statusStyle['active'];
                var sl = statusLabel[routine.status] || routine.status;
                var ts = triggerStyle[routine.triggerType] || triggerStyle['manual'];
                var tl = triggerLabel[routine.triggerType] || routine.triggerType;
                var as = actionStyle[routine.actionType] || actionStyle['lightweight'];
                var al = actionLabel[routine.actionType] || routine.actionType;

                var tr = document.createElement('tr');
                tr.className = 'border-b border-glass-border hover:bg-glass-100 transition-colors';
                tr.innerHTML =
                    '<td class="py-2.5 pl-3"><button type="button" class="btn-title text-zinc-200 hover:text-brand-emerald transition-colors text-left">' + esc(routine.name) + '</button></td>' +
                    '<td class="py-2.5"><span class="text-[10px] px-1.5 py-0.5 rounded font-medium ' + ts + '">' + esc(tl) + '</span></td>' +
                    '<td class="py-2.5"><span class="text-[10px] px-1.5 py-0.5 rounded font-medium ' + as + '">' + esc(al) + '</span></td>' +
                    '<td class="py-2.5 text-xs text-zinc-500">' + (routine.lastRunAt ? esc(routine.lastRunAt) : '<span class="text-zinc-600">\u2014</span>') + '</td>' +
                    '<td class="py-2.5 text-xs text-zinc-500">' + (routine.nextFireAt ? esc(routine.nextFireAt) : '<span class="text-zinc-600">\u2014</span>') + '</td>' +
                    '<td class="py-2.5 text-xs text-zinc-400">' + routine.runCount + '</td>' +
                    '<td class="py-2.5"><span class="text-[10px] px-1.5 py-0.5 rounded font-medium ' + ss.bg + '">' + sl + '</span></td>' +
                    '<td class="py-2.5 pl-3 whitespace-nowrap">' + actionButtons(routine) + '</td>';

                tr.querySelector('.btn-title').addEventListener('click', function () {
                    openDetail(routine);
                });

                bindRowActions(tr, routine);
                routineRowsEl.appendChild(tr);
            });
        }

        /* ── action buttons per routine ───────────────────────── */
        function actionButtons(routine) {
            var btns = '';
            var base = 'inline-flex items-center px-2 py-2 md:py-0.5 rounded text-[10px] border border-glass-border text-zinc-400 hover:text-zinc-200 hover:bg-glass-200 transition-colors';
            if (routine.enabled) {
                btns += '<button type="button" class="btn-trigger ' + base + ' mr-1" title="Trigger"><iconify-icon icon="carbon:play-filled" class="md:hidden"></iconify-icon><span class="hidden md:inline">Trigger</span></button>';
                btns += '<button type="button" class="btn-toggle ' + base + ' hover:!text-amber-400 hover:!border-amber-500/30 hover:!bg-amber-500/10 mr-1" title="Disable"><iconify-icon icon="carbon:pause-filled" class="md:hidden"></iconify-icon><span class="hidden md:inline">Disable</span></button>';
            } else {
                btns += '<button type="button" class="btn-toggle ' + base + ' mr-1" title="Enable"><iconify-icon icon="carbon:play-filled" class="md:hidden"></iconify-icon><span class="hidden md:inline">Enable</span></button>';
            }
            btns += '<button type="button" class="btn-detail ' + base + '" title="Details"><iconify-icon icon="carbon:information" class="md:hidden"></iconify-icon><span class="hidden md:inline">Details</span></button>';
            return btns;
        }

        function bindRowActions(tr, routine) {
            var triggerBtn = tr.querySelector('.btn-trigger');
            var toggleBtn  = tr.querySelector('.btn-toggle');
            var detailBtn  = tr.querySelector('.btn-detail');

            if (triggerBtn) {
                triggerBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    triggerRoutine(routine);
                    renderSummary();
                    renderTable();
                });
            }
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    routine.enabled = !routine.enabled;
                    if (routine.enabled) {
                        routine.status = routine.consecutiveFailures > 0 ? 'failing' : 'active';
                    } else {
                        routine.status = 'disabled';
                        routine.nextFireAt = null;
                    }
                    renderSummary();
                    renderTable();
                });
            }
            if (detailBtn) {
                detailBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    openDetail(routine);
                });
            }
        }

        /* ── detail modal ────────────────────────────────────── */
        function openDetail(routine) {
            var ss = statusStyle[routine.status] || statusStyle['active'];
            var sl = statusLabel[routine.status] || routine.status;
            var ts = triggerStyle[routine.triggerType] || triggerStyle['manual'];
            var tl = triggerLabel[routine.triggerType] || routine.triggerType;
            var as = actionStyle[routine.actionType] || actionStyle['lightweight'];
            var al = actionLabel[routine.actionType] || routine.actionType;

            modalTitle.textContent = routine.name;

            modalMeta.innerHTML =
                '<span class="text-[10px] px-1.5 py-0.5 rounded font-medium ' + ss.bg + '">' + sl + '</span>' +
                '<span class="text-[10px] px-1.5 py-0.5 rounded font-medium ' + ts + '">' + esc(tl) + '</span>' +
                '<span class="text-[10px] px-1.5 py-0.5 rounded font-medium ' + as + '">' + esc(al) + '</span>';

            var body = '';

            /* description */
            body += '<div class="text-sm text-zinc-400 leading-relaxed">' + esc(routine.description) + '</div>';

            /* trigger details */
            body += '<div>';
            body += '<div class="text-xs text-zinc-500 font-medium mb-1.5">Trigger</div>';
            body += '<div class="bg-glass-200 rounded-lg p-3 border border-glass-border text-xs space-y-1">';
            if (routine.triggerType === 'cron') {
                body += '<div class="flex gap-2"><span class="text-zinc-500">Schedule</span><span class="font-mono text-zinc-300">' + esc(routine.trigger.schedule) + '</span></div>';
                if (routine.trigger.timezone) {
                    body += '<div class="flex gap-2"><span class="text-zinc-500">Timezone</span><span class="text-zinc-300">' + esc(routine.trigger.timezone) + '</span></div>';
                }
            } else if (routine.triggerType === 'event') {
                body += '<div class="flex gap-2"><span class="text-zinc-500">Pattern</span><span class="font-mono text-zinc-300">' + esc(routine.trigger.pattern) + '</span></div>';
                body += '<div class="flex gap-2"><span class="text-zinc-500">Channel</span><span class="text-zinc-300">' + (routine.trigger.channel ? esc(routine.trigger.channel) : 'any') + '</span></div>';
            } else if (routine.triggerType === 'system_event') {
                body += '<div class="flex gap-2"><span class="text-zinc-500">Source</span><span class="text-zinc-300">' + esc(routine.trigger.source) + '</span></div>';
                body += '<div class="flex gap-2"><span class="text-zinc-500">Event</span><span class="font-mono text-zinc-300">' + esc(routine.trigger.eventType) + '</span></div>';
            } else {
                body += '<div class="text-zinc-500">Triggered manually via tool or API</div>';
            }
            body += '</div></div>';

            /* action details */
            body += '<div>';
            body += '<div class="text-xs text-zinc-500 font-medium mb-1.5">Action</div>';
            body += '<div class="bg-glass-200 rounded-lg p-3 border border-glass-border text-xs space-y-1">';
            if (routine.actionType === 'lightweight') {
                body += '<div><span class="text-zinc-500">Prompt</span><div class="text-zinc-300 mt-0.5">' + esc(routine.action.prompt) + '</div></div>';
                if (routine.action.contextPaths && routine.action.contextPaths.length > 0) {
                    body += '<div class="flex gap-2"><span class="text-zinc-500 shrink-0">Context</span><span class="font-mono text-zinc-300">' + routine.action.contextPaths.map(esc).join(', ') + '</span></div>';
                }
                body += '<div class="flex gap-2"><span class="text-zinc-500">Max tokens</span><span class="text-zinc-300">' + routine.action.maxTokens + '</span></div>';
            } else {
                body += '<div class="flex gap-2"><span class="text-zinc-500">Job title</span><span class="text-zinc-300">' + esc(routine.action.title) + '</span></div>';
                body += '<div class="flex gap-2"><span class="text-zinc-500">Max iterations</span><span class="text-zinc-300">' + routine.action.maxIterations + '</span></div>';
                if (routine.action.toolPermissions && routine.action.toolPermissions.length > 0) {
                    body += '<div class="flex gap-2"><span class="text-zinc-500 shrink-0">Tools</span><span class="font-mono text-zinc-300">' + routine.action.toolPermissions.map(esc).join(', ') + '</span></div>';
                }
            }
            body += '</div></div>';

            /* timestamps + stats */
            body += '<div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs">';
            body += '<span class="text-zinc-500">Created</span><span class="text-zinc-300">' + esc(routine.createdAt) + '</span>';
            if (routine.lastRunAt) {
                body += '<span class="text-zinc-500">Last run</span><span class="text-zinc-300">' + esc(routine.lastRunAt) + '</span>';
            }
            if (routine.nextFireAt) {
                body += '<span class="text-zinc-500">Next fire</span><span class="text-zinc-300">' + esc(routine.nextFireAt) + '</span>';
            }
            body += '<span class="text-zinc-500">Total runs</span><span class="text-zinc-300">' + routine.runCount + '</span>';
            if (routine.consecutiveFailures > 0) {
                body += '<span class="text-zinc-500">Consecutive failures</span><span class="text-red-400">' + routine.consecutiveFailures + '</span>';
            }
            body += '<span class="text-zinc-500">Cooldown</span><span class="text-zinc-300">' + esc(routine.guardrails.cooldown) + '</span>';
            body += '<span class="text-zinc-500">Max concurrent</span><span class="text-zinc-300">' + routine.guardrails.maxConcurrent + '</span>';
            body += '</div>';

            /* recent runs */
            if (routine.recentRuns.length > 0) {
                body += '<div>';
                body += '<div class="text-xs text-zinc-500 font-medium mb-1.5">Recent runs</div>';
                body += '<div class="bg-glass-200 rounded-lg p-3 border border-glass-border space-y-1">';
                routine.recentRuns.forEach(function (run) {
                    var rs = runStatusStyle[run.status] || runStatusStyle['ok'];
                    var tokens = (run.tokensUsed !== null && run.tokensUsed !== undefined) ? run.tokensUsed.toLocaleString() + ' tokens' : '';
                    var linked = run.jobId ? ' <span class="text-zinc-600">\u2192 job</span>' : '';
                    body += '<div class="flex items-center gap-2 text-xs">' +
                        '<span class="font-mono text-zinc-500">' + esc(run.startedAt) + '</span>' +
                        '<span class="' + rs.color + '">' + esc(run.status) + '</span>' +
                        (tokens ? '<span class="text-zinc-600">' + tokens + '</span>' : '') +
                        linked +
                        '</div>';
                });
                body += '</div></div>';
            }

            modalBody.innerHTML = body;

            /* modal actions */
            var acts = '';
            if (routine.enabled) {
                acts += '<button type="button" id="modal-trigger" class="px-4 py-2 rounded-lg text-sm text-zinc-300 font-medium transition-colors border border-brand-emerald/60 hover:bg-brand-emerald/10">Trigger</button>';
                acts += '<button type="button" id="modal-toggle" class="px-4 py-2 rounded-lg text-sm text-zinc-300 font-medium transition-colors border border-amber-500/60 hover:bg-amber-500/10">Disable</button>';
            } else {
                acts += '<button type="button" id="modal-toggle" class="px-4 py-2 rounded-lg text-sm text-zinc-300 font-medium transition-colors border border-brand-emerald/60 hover:bg-brand-emerald/10">Enable</button>';
            }
            acts += '<button type="button" id="modal-delete" class="px-4 py-2 rounded-lg text-sm text-zinc-300 font-medium transition-colors border border-red-500/60 hover:bg-red-500/10">Delete</button>';
            modalActions.innerHTML = acts;

            var trigBtn = document.getElementById('modal-trigger');
            var togBtn  = document.getElementById('modal-toggle');
            var delBtn  = document.getElementById('modal-delete');

            if (trigBtn) {
                trigBtn.addEventListener('click', function () {
                    triggerRoutine(routine);
                    closeDetail();
                    renderSummary();
                    renderTable();
                });
            }
            if (togBtn) {
                togBtn.addEventListener('click', function () {
                    routine.enabled = !routine.enabled;
                    if (routine.enabled) {
                        routine.status = routine.consecutiveFailures > 0 ? 'failing' : 'active';
                    } else {
                        routine.status = 'disabled';
                        routine.nextFireAt = null;
                    }
                    closeDetail();
                    renderSummary();
                    renderTable();
                });
            }
            if (delBtn) {
                delBtn.addEventListener('click', function () {
                    var idx = routines.indexOf(routine);
                    if (idx !== -1) routines.splice(idx, 1);
                    closeDetail();
                    renderSummary();
                    renderTable();
                });
            }

            detailModal.open();
        }

        var detailModal = initDetailModal();
        function closeDetail() { detailModal.close(); }

        /* ── init ──────────────────────────────────────────────── */
        renderSummary();
        renderTable();
    })();
    </script>

</body></html>
